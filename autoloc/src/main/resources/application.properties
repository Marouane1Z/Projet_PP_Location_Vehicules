spring.application.name=autoloc
# JWT
jwt.secret=autoloc_secret_key_very_long_and_secure_must_be_32_chars
jwt.expiration=86400000

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/autoloc?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# JPA ? crÈe les tables automatiquement depuis vos entitÈs
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=false