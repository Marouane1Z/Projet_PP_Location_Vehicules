<div class="page">
  <div class="page-header">
    <p class="breadcrumb">/client/notifications</p>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h1>🔔 Notifications</h1>
      <button class="btn btn-outline btn-sm" (click)="marquerToutesLues()" *ngIf="nonLues > 0">✓ Tout marquer lu</button>
    </div>
    <p class="subtitle">{{ nonLues }} non lues</p>
  </div>

  <div class="notif-list">
    <div class="notif-item" *ngFor="let n of notifications" [class.unread]="!n.lue" (click)="marquerLue(n)">
      <div class="notif-dot" *ngIf="!n.lue"></div>
      <div class="notif-content">
        <p class="notif-title">{{ n.titre }}</p>
        <p class="notif-date">{{ n.dateEnvoi | date:'dd/MM/yyyy HH:mm' }}</p>
      </div>
    </div>
    <div class="empty" *ngIf="notifications.length === 0">
      <p>Aucune notification</p>
    </div>
  </div>
</div>
